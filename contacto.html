<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto - Urban Cosméticos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Tu CSS -->
  <link rel="stylesheet" href="CSS/Style.css">
</head>
<body>
  <!-- Navbar -->
  <nav>
    <ul>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-urban">

      <li><a href="index.html">Inicio</a></li>
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>

  <!-- Encabezado -->
  <header>
    <h1>Contáctanos</h1>
    <p>Estamos aquí para ayudarte</p>
  </header>

  <!-- Sección de contacto -->
  <section>
    <h2>Formulario de contacto</h2>
    <form>
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">

      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" placeholder="tu@correo.com">

      <label for="mensaje">Mensaje:</label>
      <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí"></textarea>

      <button type="submit">Enviar</button>
    </form>
  </section>

  <!-- Footer -->
    <footer class="text-center py-3 bg-dark text-white">
    <p>&copy; 2026 Urban Cosméticos</p>
    <p>Contacto: contacto@urban.com | Tel: +56 9 1234 5678</p>
    <div>
      <a href="#" class="text-white me-3">Facebook</a>
      <a href="#" class="text-white me-3">Instagram</a>
      <a href="#" class="text-white">Twitter</a>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
